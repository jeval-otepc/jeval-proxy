worker_processes auto;

events {
  worker_connections 1024;
}

http {

  server {
    listen 80;
    server_name jeval.otepc.go.th;

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {

    listen 443 ssl;
    server_name jeval.otepc.go.th;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # Handle Strapi API endpoints (most specific match first)
    location ~ ^/api(/.*)?$ {
      proxy_pass http://jeval-strapi-app:1337$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://jeval-app:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle /admin/settings and all sub-paths first (most specific match)
    location ~ ^/admin/settings(/.*)?$ {
      proxy_pass http://jeval-strapi-app:1337$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle /content-type-builder and all sub-paths (outside admin scope)
    location ~ ^/content-type-builder(/.*)?$ {
      proxy_pass http://jeval-strapi-app:1337$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle /content-manager and all sub-paths (outside admin scope)
    location ~ ^/content-manager(/.*)?$ {
      proxy_pass http://jeval-strapi-app:1337$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle /i18n and all sub-paths (outside admin scope)
    location ~ ^/i18n(/.*)?$ {
      proxy_pass http://jeval-strapi-app:1337$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle /upload and all sub-paths (outside admin scope)
    location ~ ^/upload(/.*)?$ {
      proxy_pass http://jeval-strapi-app:1337$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle /users-permissions and all sub-paths (outside admin scope)
    location ~ ^/users-permissions(/.*)?$ {
      proxy_pass http://jeval-strapi-app:1337$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle Strapi API endpoints under /admin/api (most specific match first)
    location ~ ^/admin/api(/.*)?$ {
      proxy_pass http://jeval-strapi-app:1337$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle other Strapi admin routes with whitelist + wildcard (keep /admin prefix)
    # Specific known paths + wildcard for new features
    location ~ ^/admin/(init|renew-token|users|roles|project-type|information|telemetry-properties|homepage|login|auth|logout|market|documentation|webhooks|review-workflows|releases|i18n|graphql|content-manager|content-type-builder|upload|plugins|[a-zA-Z0-9_-]+)(/.*)?$ {
      proxy_pass http://jeval-strapi-app:1337$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle admin panel UI (keep /admin prefix)
    location /admin {
      proxy_pass http://jeval-strapi-app:1337/admin;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle standalone /email routes (for Strapi admin panel compatibility)
    location /email {
      proxy_pass http://jeval-strapi-app:1337/email;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

  }
}
